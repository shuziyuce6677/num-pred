body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.9;background-image:radial-gradient(ellipse at 30% 0%,rgba(201,160,64,0.05) 0%,transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(64,128,176,0.04) 0%,transparent 50%)}
.ct{max-width:520px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:24px 0 14px}

.hd h1{font-size:19px;color:var(--gold2);font-weight:600;letter-spacing:2px}
.hd p{font-size:11px;color:var(--dim)}
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.cd h2{font-size:14px;color:var(--gold2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cd h2::before{content:'';width:2px;height:14px;background:var(--gold);border-radius:1px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 11px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.pi{display:flex;gap:6px;align-items:center}
.pi span{color:var(--dim);font-size:12px}
.pi input{flex:1;padding:10px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:19px;text-align:center;letter-spacing:5px;outline:none;max-width:140px;font-family:inherit}

.btn{width:100%;padding:12px;background:linear-gradient(135deg,#7a5a10,#b08020);color:#1a1a0a;border:none;border-radius:7px;font-size:15px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:inherit}

.results{display:none}

.ov{background:#0c0c1a;border-radius:7px;padding:9px;text-align:center;border:1px solid var(--border)}

.ftip{font-size:13px;color:#e8d080;text-align:center;padding:12px 8px;margin-top:6px;background:rgba(192,64,64,0.08);border-radius:7px;font-weight:600;letter-spacing:1px}
.pw{background:linear-gradient(135deg,#141408,#1a1808);border:2px dashed var(--gold);border-radius:var(--r);padding:20px 16px;text-align:center;margin:14px 0;position:relative}
.pw::before{content:'🔒';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:24px;background:var(--bg);padding:0 8px}
.pw h3{color:var(--gold2);font-size:15px;margin:6px 0}
.price{font-size:24px;color:var(--gold);font-weight:700;margin:5px 0}
.qr-img{width:150px;height:150px;margin:10px auto;border-radius:7px;overflow:hidden;border:2px solid var(--border)}
.qr-img img{width:100%;height:100%;object-fit:contain;background:#fff}
.ur{display:flex;gap:6px;margin-top:8px}
.ur input{flex:1;padding:8px;background:#0c0c1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;text-align:center;outline:none;font-family:inherit}
.ur button{padding:8px 16px;background:var(--gold);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.locked{filter:blur(6px);pointer-events:none;user-select:none;opacity:0.28}
.unlocked{filter:none;pointer-events:auto;user-select:auto;opacity:1}
.dt{font-size:11px;line-height:2.2;color:#c0b8a8;margin:10px 0;padding-top:10px;border-top:1px solid var(--border)}
.dt strong{color:var(--gold2);display:block;margin:10px 0 4px;font-size:12px}
.dt .hl{color:var(--gold)}.dt .warn{color:#e06060;font-weight:600}
.ft{text-align:center;padding:16px;font-size:9px;color:var(--dim)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rc{animation:up .5s ease forwards}
</style>
</head>

// ====== 二、引擎层 ======
var E2N={'1':'金','2':'金','3':'火','4':'木','5':'木','6':'水','7':'土','8':'土','9':'金','0':'土'};
var N2G={'1':'乾','2':'兑','3':'离','4':'震','5':'巽','6':'坎','7':'艮','8':'坤','9':'乾','0':'坤'};
var SHENG={木:'火',火:'土',土:'金',金:'水',水:'木'};
var KE={金:'木',木:'土',土:'水',水:'火',火:'金'};
function se(a,b){return SHENG[a]===b}
function ke(a,b){return KE[a]===b}
var DZ={0:'亥',1:'子',2:'丑',3:'寅',4:'卯',5:'辰',6:'巳',7:'午',8:'未',9:'申'};
var TAO={子:1,卯:1,午:1,酉:1};
var CK={丑:1,辰:1,未:1,戌:1};
var DAYUN=[[10,20,'乾','金'],[20,30,'兑','金'],[30,40,'离','火'],[40,50,'震','木'],[50,60,'巽','木'],[60,70,'坎','水'],[70,80,'艮','土'],[80,99,'坤','土']];
function getDy(age){for(var i=0;i<DAYUN.length;i++)if(age>=DAYUN[i][0]&&age<DAYUN[i][1])return{n:DAYUN[i][2],el:DAYUN[i][3],r:[DAYUN[i][0],DAYUN[i][1]]};return age<10?{n:'乾',el:'金',r:[10,20]}:{n:'坤',el:'土',r:[80,90]}}

function parse(digits,age,gender,dur){
  var d=digits.split(''),ec={金:0,木:0,水:0,火:0,土:0},gc={};
  for(var i=0;i<4;i++){var el=E2N[d[i]],g=N2G[d[i]];ec[el]=(ec[el]||0)+1;gc[g]=(gc[g]||0)+1}
  var domE='',dc=0;for(var e in ec)if(ec[e]>dc){domE=e;dc=ec[e]}
  var domG=[];for(var g in gc)if(gc[g]>=2)domG.push(g);
  var bz=(d[0]===d[1]&&d[1]===d[2]&&d[2]===d[3]);
  var acc=false;for(var i=0;i<3;i++){var e1=E2N[d[i]],e2=E2N[d[i+1]];if((e1==='火'&&e2==='金')||(e1==='金'&&e2==='木'))acc=true}
  var pal=[{n:'父母宫',dg:d[0],el:E2N[d[0]],g:N2G[d[0]]},{n:'夫妻宫',dg:d[1],el:E2N[d[1]],g:N2G[d[1]]},{n:'自身宫',dg:d[2],el:E2N[d[2]],g:N2G[d[2]]},{n:'子女宫',dg:d[3],el:E2N[d[3]],g:N2G[d[3]]}];
  var self=pal[2];
  function ssType(otherEl){if(ke(otherEl,self.el))return'官鬼';if(ke(self.el,otherEl))return'财';if(se(otherEl,self.el))return'印';if(se(self.el,otherEl))return'食伤';return'比劫'}
  var spSS=ssType(pal[1].el),paSS=ssType(pal[0].el),chSS=ssType(pal[3].el);
  var ddy=getDy(age),dyR='';
  if(se(ddy.el,self.el))dyR='ss';else if(ke(ddy.el,self.el))dyR='ks';else if(se(self.el,ddy.el))dyR='ss2';else if(ke(self.el,ddy.el))dyR='sk';else dyR='bh';
  var ht=false,hc=false;for(var i=0;i<4;i++){if(TAO[DZ[d[i]]])ht=true;if(CK[DZ[d[i]]])hc=true}
  return{digits:d,ec:ec,gc:gc,domE:domE,domG:domG,bz:bz,acc:acc,pal:pal,self:self,paSS:paSS,spSS:spSS,chSS:chSS,dy:ddy,dyR:dyR,ht:ht,hc:hc,age:age,gender:gender,dur:dur};
}

// ====== 三、语料检索引擎(pick + 去重) ======
function pick(arr,seed){return arr[Math.abs(seed)%arr.length]}
function picks(arr,seed,count){
  var result=[],used={},tries=0;
  while(result.length<count&&tries<50){
    var idx=Math.abs(seed+result.length*7+tries*13)%arr.length;
    if(!used[idx]){used[idx]=1;result.push(arr[idx])}
    tries++;
  }
  return result;
}

// ====== 四、组合输出引擎 ======
function buildReport(comp){
  var seed=parseInt(comp.digits.join(''),10),el=comp.domE,cnt=comp.ec[el];
  var ed=EL_DESC[el]||EL_DESC['土'];
  var out={};

  // 元素分布描述(号码专属)
  var level=cnt>=3?'many':cnt>=2?'med':'few';
  out.elHead=pick(ed.head,seed);
  out.elDesc=pick(ed[level],seed+1).replace('{0}',cnt);

  // 特征标签(号码专属,每号码取不同的标签组合)
  out.tags=picks(TAG_POOL[el],seed,6);

  // 四宫十神表达(每宫取不同的表达)
  var palaceNames=['父母宫','夫妻宫','子女宫'];
  var palaceSS=[comp.paSS,comp.spSS,comp.chSS];
  out.palaces=[];
  for(var i=0;i<3;i++){
    var ss=palaceSS[i],pn=palaceNames[i];
    var pool=PALACE_EXP[pn][ss]||PALACE_EXP[pn]['比劫'];
    out.palaces.push({name:pn,ss:ss,exp:pick(pool,seed+i*17+parseInt(comp.digits[i]))});
  }

  // 四维度分析
  var dims={career:'💼 事业',wealth:'💰 财富',love:'💕 感情',health:'🏥 健康'};
  out.dims={};
  var di=0;
  for(var dk in dims){
    var dp=DIM_POOL[dk];
    out.dims[dk]={
      emoji:dims[dk],
      prefix:pick(dp.prefix,seed+di*11),
      result:pick(dp.result,seed+di*13+1),
      advice:pick(dp.advice,seed+di*17+2)
    };
    di++;
  }

  // 大运
  var dy=DY_STAGE[comp.dy.n]||DY_STAGE['乾'];
  out.dayun={name:dy.name,desc:pick(dy.desc,seed+31),tip:pick(DY_REL[comp.dyR]||DY_REL['bh'],seed+37)};

  return out;
}

// ====== 六、事件 ======
var isUnlocked=false;
function showError(m){document.getElementById('errorMsg').textContent=m;document.getElementById('errorMsg').style.display='block'}

function startAnalysis(){
  try{
    var ds=document.getElementById('phoneDigits').value.trim();
    var dur=document.getElementById('duration').value,gd=document.getElementById('gender').value;
    var ag=parseInt(document.getElementById('age').value);
    if(!/^\d{4}$/.test(ds)){showError('请输入4位数字');return}
    if(!dur){showError('请选择使用时长');return}
    if(!gd){showError('请选择性别');return}
    if(!ag||isNaN(ag)||ag<10||ag>100){showError('请输入有效年龄');return}
    try{isUnlocked=localStorage.getItem('np_v5')==='true'}catch(e){isUnlocked=false}
    var comp=parse(ds,ag,gd,parseFloat(dur));
    var out=buildReport(comp);
    render(comp,out);
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('resultsSection').scrollIntoView({behavior:'smooth'});
  }catch(e){showError('出错: '+e.message);console.error(e)}
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('jsStatus').style.display='block';
  try{isUnlocked=localStorage.getItem('np_v5')==='true'}catch(e){}
  document.getElementById('analyzeBtn').addEventListener('click',startAnalysis);
  document.getElementById('phoneDigits').addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)});
  var rs=document.getElementById('resultsSection');
  rs.addEventListener('click',function(e){if(e.target.closest('#unlockBtn'))unlock()});
});
function unlock(){var c=document.getElementById('unlockCode').value.trim();if(['8888','2026','6688'].indexOf(c)>=0){isUnlocked=true;try{localStorage.setItem('np_v5','true')}catch(e){}var pw=document.getElementById('paywall');if(pw)pw.style.display='none';var ds=document.getElementById('detailSection');if(ds){ds.classList.remove('locked');ds.classList.add('unlocked')}}else{alert('解锁码错误，请确认后重试。')}}
window.onerror=function(m){var el=document.getElementById('errorMsg');el.innerHTML='⚠ '+m;el.style.display='block';return false};
</script>
